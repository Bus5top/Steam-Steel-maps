<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Steam & Steel — Route Planner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Arial, sans-serif; }
    body { display: flex; flex-direction: column; background: #f5f5f5; }
    
    header {
      background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.15);
    }
    header h1 { margin: 0; font-size: 1.5rem; }
    
    a, button {
      padding: 10px 16px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
      font-size: 0.9rem;
    }
    a:hover, button:hover { background: #2980b9; }
    
    main { flex: 1; display: flex; overflow: hidden; }
    
    .sidebar {
      width: 280px;
      background: white;
      border-right: 1px solid #ddd;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .section {
      border-bottom: 1px solid #eee;
      padding-bottom: 16px;
    }
    .section:last-child { border-bottom: none; }
    
    .section h3 { font-size: 0.9rem; color: #2c3e50; margin-bottom: 10px; text-transform: uppercase; }
    
    .tool-btn {
      width: 100%;
      padding: 10px;
      text-align: left;
      background: #f9f9f9;
      border: 2px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .tool-btn:hover { background: #f0f0f0; }
    .tool-btn.active { border-color: #3498db; background: #e3f2fd; color: #3498db; font-weight: 600; }
    
    .color-palette {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    
    .color-option {
      width: 100%;
      height: 40px;
      border: 3px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .color-option:hover { transform: scale(1.05); }
    .color-option.active { border-color: #333; box-shadow: 0 0 8px rgba(0,0,0,0.3); }
    
    .canvas-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
    }
    
    .canvas-container {
      flex: 1;
      position: relative;
      overflow: auto;
      background: #fafafa;
    }
    
    canvas { display: block; cursor: crosshair; }
    
    .save-section {
      padding: 12px;
      background: #f9f9f9;
      border-top: 1px solid #ddd;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .save-section button { flex: 1; min-width: 100px; margin: 0; }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.show { display: flex; }
    
    .modal-content {
      background: white;
      padding: 32px;
      border-radius: 12px;
      max-width: 600px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    
    .modal-content h2 { margin-bottom: 20px; color: #2c3e50; }
    
    .map-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .map-option {
      padding: 12px;
      background: #f9f9f9;
      border: 2px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      text-align: center;
      font-weight: 600;
      transition: all 0.2s;
      font-size: 0.85rem;
    }
    .map-option:hover { border-color: #3498db; background: #e3f2fd; }
    .map-option.selected { border-color: #3498db; background: #e3f2fd; color: #3498db; }
    
    .form-group {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
    }
    
    .form-group label { font-weight: 600; margin-bottom: 6px; color: #2c3e50; }
    .form-group input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }
    
    @media (max-width: 768px) {
      main { flex-direction: column; }
      .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #ddd; max-height: 150px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🛣️ Route Planner</h1>
    <a href="viewer.html">← Maps</a>
  </header>

  <main>
    <div class="sidebar">
      <div class="section">
        <h3>Map</h3>
        <button style="width: 100%; margin: 0;" onclick="selectNewMap()">Change Map</button>
        <div id="mapDisplay" style="margin-top: 8px; padding: 8px; background: #f9f9f9; border-radius: 6px; font-size: 0.9rem; font-weight: 600; color: #2c3e50;"></div>
      </div>

      <div class="section">
        <h3>Tools</h3>
        <button class="tool-btn active" data-tool="route" onclick="selectTool('route')">📍 Route (drag)</button>
        <button class="tool-btn" data-tool="tunnel" onclick="selectTool('tunnel')">🕳️ Tunnel (click)</button>
        <button class="tool-btn" data-tool="station" onclick="selectTool('station')">🚂 Station (click)</button>
        <button class="tool-btn" data-tool="erase" onclick="selectTool('erase')">❌ Erase (click)</button>
        <button class="tool-btn" data-tool="clear" onclick="clearAll()" style="background: #ffe0e0; color: #c0392b;">🗑️ Clear All</button>
      </div>

      <div class="section">
        <h3>Colors</h3>
        <div class="color-palette">
          <div class="color-option active" style="background: #e74c3c;" onclick="selectColor('#e74c3c')"></div>
          <div class="color-option" style="background: #3498db;" onclick="selectColor('#3498db')"></div>
          <div class="color-option" style="background: #27ae60;" onclick="selectColor('#27ae60')"></div>
          <div class="color-option" style="background: #f39c12;" onclick="selectColor('#f39c12')"></div>
          <div class="color-option" style="background: #9b59b6;" onclick="selectColor('#9b59b6')"></div>
          <div class="color-option" style="background: #34495e;" onclick="selectColor('#34495e')"></div>
        </div>
      </div>

      <div class="section">
        <h3>Export/Import</h3>
        <button onclick="exportPlan()" style="width: 100%; margin-bottom: 8px;">📋 Export</button>
        <button onclick="importPlan()" style="width: 100%;">📥 Import</button>
      </div>
    </div>

    <div class="canvas-area">
      <div class="canvas-container">
        <canvas id="canvas"></canvas>
      </div>
      <div class="save-section">
        <input type="text" id="planTitle" placeholder="Plan name (optional)" style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
        <input type="text" id="planCreator" placeholder="Your name (optional)" style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
        <button onclick="savePlanToStorage()" style="background: #27ae60; flex: 0.5;">💾 Save</button>
      </div>
    </div>
  </main>

  <div class="modal" id="mapSelector">
    <div class="modal-content">
      <h2>Select a Map</h2>
      <div class="map-grid" id="mapGrid"></div>
      <div style="text-align: center;">
        <button onclick="closeModal()" style="width: 200px;">Close</button>
      </div>
    </div>
  </div>

    let app = {
      maps: [],
      state: { tool: 'route', color: '#e74c3c', drawing: false, startX: 0, startY: 0 },
      selectedMap: null,
      history: [],
      routes: [],
      tunnels: [],
      stations: [],

      async init() {
        await this.loadMaps();
        this.setupCanvas();
        this.renderMapSelector();
        
        const selected = localStorage.getItem('selectedMapForPlanning');
        if (selected) {
          this.selectMap(selected);
          localStorage.removeItem('selectedMapForPlanning');
        } else {
          this.showMapSelector();
        }
      },

      async loadMaps() {
        try {
          const res = await fetch('data/steam_steel_maps.json');
          if (!res.ok) throw new Error('Failed to load maps from server');
          const data = await res.json();
          this.maps = data.maps || [];
        } catch (err) {
          console.warn('Failed to load maps from server, using embedded data:', err.message);
          // Fallback to embedded data
          this.maps = embeddedMapsData.maps || [];
        }
      },

      renderMapSelector() {
        const grid = document.getElementById('mapGrid');
        grid.innerHTML = this.maps.map((m, i) => `
          <div class="map-option" onclick="app.selectMap('${m.title}')">${m.title}</div>
        `).join('');
      },

      selectMap(title) {
        const map = this.maps.find(m => m.title === title);
        if (!map) return;
        this.selectedMap = map;
        document.getElementById('mapDisplay').innerText = map.title;
        this.closeModal();
        this.routes = [];
        this.tunnels = [];
        this.stations = [];
        this.history = [];
        this.render();
      },

      setupCanvas() {
        const canvas = document.getElementById('canvas');
        const container = canvas.parentElement;
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;

        canvas.addEventListener('mousedown', (e) => this.handleMouseDown(e));
        canvas.addEventListener('mousemove', (e) => this.handleMouseMove(e));
        canvas.addEventListener('mouseup', () => this.handleMouseUp());
        canvas.addEventListener('mouseleave', () => this.state.drawing = false);

        window.addEventListener('resize', () => {
          canvas.width = container.clientWidth;
          canvas.height = container.clientHeight;
          this.render();
        });

        document.addEventListener('keydown', (e) => {
          if (e.ctrlKey && e.key === 'z') { this.undo(); e.preventDefault(); }
          if (e.key === 'c' || e.key === 'C') { this.clearAll(); }
        });
      },

      handleMouseDown(e) {
        const rect = e.target.getBoundingClientRect();
        this.state.startX = e.clientX - rect.left;
        this.state.startY = e.clientY - rect.top;
        this.state.drawing = true;
      },

      handleMouseMove(e) {
        if (!this.state.drawing || this.state.tool === 'tunnel' || this.state.tool === 'station') return;
        this.render();
        if (this.state.tool === 'route') {
          const rect = e.target.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const ctx = e.target.getContext('2d');
          ctx.strokeStyle = this.state.color;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(this.state.startX, this.state.startY);
          ctx.lineTo(x, y);
          ctx.stroke();
        }
      },

      handleMouseUp(e) {
        if (!this.state.drawing) return;
        this.state.drawing = false;
        
        if (this.state.tool === 'route') {
          const canvas = document.getElementById('canvas');
          const rect = canvas.getBoundingClientRect();
          const x = e ? e.clientX - rect.left : 0;
          const y = e ? e.clientY - rect.top : 0;
          this.routes.push({ x1: this.state.startX, y1: this.state.startY, x2: x, y2: y, color: this.state.color });
          this.saveHistory();
        }
        this.render();
      },

      addMarker(x, y, type) {
        if (type === 'tunnel') this.tunnels.push({ x, y, color: this.state.color });
        if (type === 'station') this.stations.push({ x, y, color: this.state.color });
        this.saveHistory();
        this.render();
      },

      eraseNear(x, y, distance = 20) {
        this.routes = this.routes.filter(r => {
          const d = Math.min(
            Math.hypot(r.x1 - x, r.y1 - y),
            Math.hypot(r.x2 - x, r.y2 - y)
          );
          return d > distance;
        });
        this.tunnels = this.tunnels.filter(t => Math.hypot(t.x - x, t.y - y) > distance);
        this.stations = this.stations.filter(s => Math.hypot(s.x - x, s.y - y) > distance);
        this.saveHistory();
        this.render();
      },

      render() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fafafa';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Grid
        ctx.strokeStyle = '#e0e0e0';
        ctx.lineWidth = 1;
        for (let i = 0; i < canvas.width; i += 50) {
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i, canvas.height);
          ctx.stroke();
        }
        for (let i = 0; i < canvas.height; i += 50) {
          ctx.beginPath();
          ctx.moveTo(0, i);
          ctx.lineTo(canvas.width, i);
          ctx.stroke();
        }

        // Routes
        this.routes.forEach(r => {
          ctx.strokeStyle = r.color;
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(r.x1, r.y1);
          ctx.lineTo(r.x2, r.y2);
          ctx.stroke();
        });

        // Tunnels (circles)
        this.tunnels.forEach(t => {
          ctx.fillStyle = t.color;
          ctx.beginPath();
          ctx.arc(t.x, t.y, 8, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#333';
          ctx.lineWidth = 2;
          ctx.stroke();
        });

        // Stations (squares)
        this.stations.forEach(s => {
          ctx.fillStyle = s.color;
          ctx.fillRect(s.x - 8, s.y - 8, 16, 16);
          ctx.strokeStyle = '#333';
          ctx.lineWidth = 2;
          ctx.strokeRect(s.x - 8, s.y - 8, 16, 16);
        });
      },

      saveHistory() {
        this.history.push({ routes: [...this.routes], tunnels: [...this.tunnels], stations: [...this.stations] });
        if (this.history.length > 20) this.history.shift();
      },

      undo() {
        if (this.history.length === 0) return;
        const prev = this.history.pop();
        this.routes = prev.routes;
        this.tunnels = prev.tunnels;
        this.stations = prev.stations;
        this.render();
      },

      clearAll() {
        if (confirm('Clear all? This cannot be undone.')) {
          this.routes = [];
          this.tunnels = [];
          this.stations = [];
          this.history = [];
          this.render();
        }
      },

      savePlanToStorage() {
        const title = document.getElementById('planTitle').value || 'Unnamed Plan';
        const creator = document.getElementById('planCreator').value || 'Anonymous';
        
        if (!this.selectedMap) {
          alert('Please select a map first');
          return;
        }

        const plans = JSON.parse(localStorage.getItem('steamsteelplans') || '{}');
        if (!plans[this.selectedMap.title]) plans[this.selectedMap.title] = [];
        
        plans[this.selectedMap.title].push({
          title,
          creator,
          routes: this.routes,
          tunnels: this.tunnels,
          stations: this.stations,
          date: new Date().toISOString()
        });

        localStorage.setItem('steamsteelplans', JSON.stringify(plans));
        alert(`✓ Plan "${title}" saved! You can see it on the Maps page.`);
        document.getElementById('planTitle').value = '';
        document.getElementById('planCreator').value = '';
      },

      exportPlan() {
        const data = { routes: this.routes, tunnels: this.tunnels, stations: this.stations, map: this.selectedMap?.title };
        const encoded = btoa(JSON.stringify(data));
        alert('Code:\n\n' + encoded + '\n\nShare this code!');
      },

      importPlan() {
        const code = prompt('Paste the code here:');
        if (!code) return;
        try {
          const data = JSON.parse(atob(code));
          this.routes = data.routes || [];
          this.tunnels = data.tunnels || [];
          this.stations = data.stations || [];
          this.saveHistory();
          this.render();
          alert('✓ Plan imported!');
        } catch (err) {
          alert('Invalid code');
        }
      },

      showMapSelector() {
        document.getElementById('mapSelector').classList.add('show');
      }
    };

    function selectNewMap() { app.showMapSelector(); }
    function closeModal() { document.getElementById('mapSelector').classList.remove('show'); }
    function selectTool(t) { app.state.tool = t; document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); }
    function selectColor(c) { app.state.color = c; document.querySelectorAll('.color-option').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); }
    function clearAll() { app.clearAll(); }
    function exportPlan() { app.exportPlan(); }
    function importPlan() { app.importPlan(); }
    function savePlanToStorage() { app.savePlanToStorage(); }

    // Handle canvas clicks for tunnel/station
    document.addEventListener('DOMContentLoaded', () => {
      app.init();
      document.getElementById('canvas').addEventListener('click', (e) => {
        if (app.state.tool === 'tunnel' || app.state.tool === 'station') {
          const rect = e.target.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          app.addMarker(x, y, app.state.tool);
        } else if (app.state.tool === 'erase') {
          const rect = e.target.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          app.eraseNear(x, y);
        }
      });
    });
